<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Card Shape</title>
    <style>
        /* Container and base styling for the card */
        .card-shape {
            width: 350px; /* Example dimensions, can be changed */
            height: 250px;
            background-color: black; /* Card background */
            border: 1px solid #e0e0e0; /* Subtle card border, like in your image */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Subtle shadow for depth */
            overflow: hidden; /* Ensures content doesn't break out of the shape */
            
            /* Apply the custom shape definition using CSS clip-path */
            /* We link it to an SVG shape definition with the ID "customPath" */
            clip-path: url(#customPath);
        }

        /* Styling for the content area to give it padding */
        .card-content {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            color: #333;
        }

        /* SVG definition of the custom path - placed in an invisible container */
        .svg-defs {
            width: 0;
            height: 0;
            overflow: hidden;
            position: absolute;
        }
    </style>
</head>
<body>

    <svg class="svg-defs">
        <defs>
            <clipPath id="customPath" clipPathUnits="objectBoundingBox">
                <path d="M 0.25 0 Q 0 0 0 0.25 V 0.75 Q 0 1 0.25 1 H 0.85 C 0.875 1, 0.9 1, 0.9 0.9 C 0.9 0.825, 1 0.825, 1 0.7 H 1 V 0.25 Q 1 0 0.75 0 Z" />
            </clipPath>
        </defs>
    </svg>

    <div class="card-shape">
        <div class="card-content">
            </div>
    </div>

</body>
</html>
